<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#639BFF"/>
      <stop offset="100%" stop-color="#2A5CAD"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0E8F8"/>
      <stop offset="100%" stop-color="#A0B4D8"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect x="8" y="8" width="240" height="240" rx="44" ry="44" fill="url(#bg)"/>
  <!-- CPU chip body -->
  <rect x="64" y="64" width="128" height="128" rx="14" ry="14" fill="url(#chip)" stroke="#fff" stroke-width="3"/>
  <!-- CPU die -->
  <rect x="88" y="88" width="80" height="80" rx="6" ry="6" fill="#2A5CAD" opacity="0.85"/>
  <!-- Pins top -->
  <rect x="88"  y="48" width="10" height="20" rx="2" fill="#E0E8F8"/>
  <rect x="108" y="48" width="10" height="20" rx="2" fill="#E0E8F8"/>
  <rect x="128" y="48" width="10" height="20" rx="2" fill="#E0E8F8"/>
  <rect x="148" y="48" width="10" height="20" rx="2" fill="#E0E8F8"/>
  <!-- Pins bottom -->
  <rect x="88"  y="188" width="10" height="20" rx="2" fill="#E0E8F8"/>
  <rect x="108" y="188" width="10" height="20" rx="2" fill="#E0E8F8"/>
  <rect x="128" y="188" width="10" height="20" rx="2" fill="#E0E8F8"/>
  <rect x="148" y="188" width="10" height="20" rx="2" fill="#E0E8F8"/>
  <!-- Pins left -->
  <rect x="48" y="88"  width="20" height="10" rx="2" fill="#E0E8F8"/>
  <rect x="48" y="108" width="20" height="10" rx="2" fill="#E0E8F8"/>
  <rect x="48" y="128" width="20" height="10" rx="2" fill="#E0E8F8"/>
  <rect x="48" y="148" width="20" height="10" rx="2" fill="#E0E8F8"/>
  <!-- Pins right -->
  <rect x="188" y="88"  width="20" height="10" rx="2" fill="#E0E8F8"/>
  <rect x="188" y="108" width="20" height="10" rx="2" fill="#E0E8F8"/>
  <rect x="188" y="128" width="20" height="10" rx="2" fill="#E0E8F8"/>
  <rect x="188" y="148" width="20" height="10" rx="2" fill="#E0E8F8"/>
  <!-- Gear/wrench symbol on die -->
  <text x="128" y="140" text-anchor="middle" font-family="sans-serif" font-size="48" fill="#fff" opacity="0.95">⚙</text>
  <!-- Label -->
  <text x="128" y="236" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#fff" opacity="0.9">TWEAKS</text>
</svg>
